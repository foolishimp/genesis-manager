description: |
  Every rendered domain model declares its acquisition mode (fd_describe vs
  fp_synthesized) beside the package name. Synthesised models display an
  explicit warning that they are not zero-interpretation. Both paths produce
  the same normalised shape; UI components bind to shape, not acquisition mode.
