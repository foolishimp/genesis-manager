description: |
  Answers INTENT Q5: "What does the engine need from me right now?"
  Surfaces pending fh_gate_pending events with criteria displayed verbatim.
  Approve (review_approved, actor=human) and reject (review_rejected, actor=human,
  reason required) actions. Surfaces proxy-log decisions for human review with
  actor, decision, timestamp, and log link. Human can override a proxy decision.
  Gate state model derived from event stream: pending | approved | rejected |
  superseded. Rejection pauses the edge; prior work preserved.
